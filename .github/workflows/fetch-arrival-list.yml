name: Hämta BookVisit ankomstlista

# Hämtar bodtilldelningarna automatiskt varje morgon; kan även köras manuellt
# (Actions → "Hämta BookVisit ankomstlista" → Run workflow).
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC ≈ 06:00 svensk sommartid (05:00 vintertid)
    - cron: "0 6 * * *" # extra körning 2h senare som hämtar ev. sena ändringar

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Hämta & ladda upp ankomstlistan
        run: npx tsx scripts/fetch-arrival-list.ts
        env:
          BOOKVISIT_USER: ${{ secrets.BOOKVISIT_USER }}
          BOOKVISIT_PASS: ${{ secrets.BOOKVISIT_PASS }}
          APP_UPLOAD_URL: ${{ secrets.APP_UPLOAD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
      - name: Spara felskärmdumpar (vid fel)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug-*.png
          if-no-files-found: ignore
