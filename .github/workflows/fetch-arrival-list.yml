name: Hämta BookVisit ankomstlista

# Hämtar bodtilldelningarna automatiskt varje morgon; kan även köras manuellt
# (Actions → "Hämta BookVisit ankomstlista" → Run workflow).
# GitHubs scheduler både förskjuter och hoppar över körningar – därför tätt
# schema (var ~40 min) över hela morgonfönstret 04:45–10:05 svensk sommartid.
# Udda minuter minskar kö-fördröjningen. Varje körning är idempotent och billig.
on:
  workflow_dispatch:
  schedule:
    - cron: "43 2,4,6 * * *"   # ≈ 04:43 / 06:43 / 08:43 svensk sommartid
    - cron: "23 3,5,7 * * *"   # ≈ 05:23 / 07:23 / 09:23
    - cron: "3 4,6,8 * * *"    # ≈ 06:03 / 08:03 / 10:03

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Hämta & ladda upp ankomstlistan
        run: npx tsx scripts/fetch-arrival-list.ts
        env:
          BOOKVISIT_USER: ${{ secrets.BOOKVISIT_USER }}
          BOOKVISIT_PASS: ${{ secrets.BOOKVISIT_PASS }}
          APP_UPLOAD_URL: ${{ secrets.APP_UPLOAD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
      - name: Spara felskärmdumpar (vid fel)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug-*.png
          if-no-files-found: ignore
