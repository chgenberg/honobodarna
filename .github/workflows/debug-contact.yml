name: DEBUG kontaktfält (tillfällig)

on:
  workflow_dispatch:
    inputs:
      booking_code:
        description: "Bokningskod att inspektera"
        required: true
        default: "OJ02KR42MA"

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Dumpa kontaktfält
        run: npx tsx scripts/_debug-contact.ts
        env:
          BOOKVISIT_USER: ${{ secrets.BOOKVISIT_USER }}
          BOOKVISIT_PASS: ${{ secrets.BOOKVISIT_PASS }}
          BOOKING_CODE: ${{ inputs.booking_code }}
      - name: Spara skärmdump
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-detail
          path: debug-detail-*.png
          if-no-files-found: ignore
